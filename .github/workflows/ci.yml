name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装工具
        run: python -m pip install --upgrade pip pytest ruff jinja2

      - name: 语法检查 (py_compile)
        run: |
          python -m py_compile main.py palwork/palsave.py

      - name: JSON 校验 (schema + data)
        run: |
          python -m json.tool _conf_schema.json > /dev/null
          find data -name "*.json" -print0 | xargs -0 -I{} python -m json.tool "{}" > /dev/null

      - name: ruff 静态检查
        run: ruff check .

      - name: pytest
        run: pytest
